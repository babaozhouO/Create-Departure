#.
#Set the stress generated by the treadmill
# Default: 16
# Range: > 0
"Treadmill Stress" = 16
#.
#The stress increase multiplier from maid affection
# Default: 16
# Range: > 0
"Maid Stress Magnification" = 16
#.
#Detection range for treadmill-related logic
# Default: 10
# Range: > 0
"Treadmill Detection Range" = 10
#.
#Set the base speed of the treadmill
# Default: 32
# Range: > 0
"Treadmill Base Speed" = 32
#.
#Controls the rate at which the player's food exhaustion decreases while on the treadmill
# Default: 0.009999999776482582
# Range: 0.0 ~ 3.4028234663852886E38
"Food Exhaustion Multiplier" = 0.009999999776482582
#.
#Whether the treadmill can throw off entities (when powered in reverse)
"Treadmill Toss" = true
#.
#Whether entities on the treadmill can break free
"Entity Escape" = true
#.
#Whether attacking entities on the treadmill speeds it up
"Treadmill Boost" = true
